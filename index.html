<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        /* CSS ဖြင့် ပုံစံဖော်ခြင်း */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0070f3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #0051af; }
    </style>
</head>
<body>

    <div class="card">
        <h1>မင်္ဂလာပါ ခင်ဗျာ! 👋</h1>
        <p>ဒါကတော့ ကျွန်တော့်ရဲ့ ပထမဆုံး Website လေးပါ။ Vercel ပေါ်မှာ Deploy လုပ်ထားတာ ဖြစ်ပါတယ်။</p>
        <a href="#" class="btn">Learn More</a>
    </div>

</body>
</html>
